services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - RAG_SERVICE_URL=http://rag-service:8090
    depends_on:
      - rag-service
    networks:
      - recipe-net
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - recipe-net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - recipe-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - recipe-net
    restart: unless-stopped

  rag-service:
    build: ./rag-service
    ports:
      - "8090:8090"
    environment:
      - CHROMA_HOST=chromadb
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./backend/output:/app/output:ro
    depends_on:
      - chromadb
      - ollama
    networks:
      - recipe-net
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
  ollama_data:
    driver: local

networks:
  recipe-net:
    driver: bridge